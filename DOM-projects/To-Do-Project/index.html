<!DOCTYPE html>
<html lang="en">
<head>
    
    <link rel="stylesheet" href="td.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Project</title>
</head>
<body>
    <div class="todo">
        <h1>Add Items</h1><br>
        <input type="text" placeholder="Add Work To Do" id="input">
        <button class="add" id="addElement">Add</button>
        <h2>Tasks</h2>
        <div class="buttons">
            <button id="button1">Clear</button>
            <button id="button2">Delete</button>
        </div>
        <div class="items"></div>

        <h2 class="completed-heading">Completed Tasks</h2>
        <div class="completed-items"></div>
    </div>
    <script src="td.js"></script>
</body>
</html>
