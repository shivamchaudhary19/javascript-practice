<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="pro2.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body>
    
<div class="container">
    <h1>BMI Calculator</h1>
    <form>
        <p><label>Weight in Kilograms (KG): </label><input type="text" id="weight" ></p>
        <p><label>Height in Inches (In): </label><input type="text" id="height" ></p>
        <button>Calculate</button>
        <div id="result"></div>
        <div id="weight-guide">
            <h3>BMI Weight Guide</h3>
            <p>Under weight = Less than 18.6</p>
            <p>Normal Range = 18.6 to 24.9</p>
            <p>Over weight = Greater than 24.9</p>
        </div>
    </form>
</div>
<script src="pro2.js"></script>
</body>
</html>
